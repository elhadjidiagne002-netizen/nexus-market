# nixpacks.toml — NEXUS Market API
# Force Node.js 20 — évite la détection automatique de Deno (index.ts présent)

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install --production"]

[phases.build]
# Rien à compiler côté backend Express pur
cmds = []

[start]
cmd = "node server.js"
