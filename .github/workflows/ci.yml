name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + tests unitaires + syntaxe Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Tests unitaires (node --test)
        run: npm run test:unit

      - name: Vérifier la syntaxe de chaque Cloudflare Pages Function
        run: |
          status=0
          while IFS= read -r -d '' file; do
            node --check "$file" || status=1
          done < <(find functions -name '*.js' -print0)
          exit $status

      - name: Vérifier que _routes.json est un JSON valide
        run: node -e "JSON.parse(require('fs').readFileSync('_routes.json','utf8')); console.log('_routes.json OK')"
