# wrangler.toml — NEXUS Market · Cloudflare Pages
# ─────────────────────────────────────────────────────────────────────────────
# IMPORTANT : ce fichier seul ne suffit pas pour nodejs_compat.
# Il faut AUSSI le définir dans le Dashboard Cloudflare Pages :
#   Pages → nexus-market → Settings → Functions → Compatibility flags
#   → Ajouter "nodejs_compat" (Production ET Preview)
# ─────────────────────────────────────────────────────────────────────────────

name = "nexus-market"

# pages_build_output_dir est OBLIGATOIRE — sans lui, Cloudflare ignore tout le fichier
pages_build_output_dir = "."

compatibility_date  = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
PAYTECH_ENV      = "prod"
SITE_URL         = "https://nexus-market.pages.dev"
FRONTEND_URL     = "https://nexus-market.pages.dev"
VAPID_EMAIL      = "mailto:admin@nexus-market.com"
NEXUS_COMMISSION = "0.15"
EUR_TO_XOF       = "655.957"
