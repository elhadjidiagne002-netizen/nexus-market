# ── SECRETS à configurer dans CF Dashboard (jamais en clair ici) ──────────
# Cloudflare Dashboard → Workers & Pages → nexus-market
#   → Settings → Variables and Secrets → Add secret
#
#   SUPABASE_SERVICE_KEY  = eyJ...  (Supabase → Settings → API → service_role)
#   GREEN_API_TOKEN       = (Green API — NE PAS committer la valeur)
#   STRIPE_SECRET_KEY     = sk_live_... ou sk_test_...
#   STRIPE_WEBHOOK_SECRET = whsec_...
#   VAPID_PRIVATE_KEY     = (depuis web-push generate-vapid-keys)
#   PAYTECH_API_KEY       = (PayTech dashboard)
#   PAYTECH_API_SECRET    = (PayTech dashboard)   # ou alias PAYTECH_SECRET_KEY
#   RESEND_API_KEY        = (Resend — requis par sendEmail)
#   GROQ_API_KEY          = (assistant IA)
#   JWT_SECRET
#   CRON_SECRET           = (token déclenchement /cron/* — = secret CRON_TOKEN GitHub)
#   ADMIN_USER_ID         = (UUID profil admin — notifications internes)
#   MUX_TOKEN_ID          = (NEXUS Stories — mux.com → Settings → Access Tokens)
#   MUX_TOKEN_SECRET      = (NEXUS Stories — secret du token Mux)
#   MUX_WEBHOOK_SECRET    = (NEXUS Stories — Mux → Webhooks → signing secret)
#
# ⚠️  Les vars NEXUS_WA_SECRET, INTERNAL_API_KEY, DELIVERY_WEBHOOK_SECRET ci-dessus
#     sont en clair dans [vars] (donc commitées) : à déplacer en secrets chiffrés.

[dev]
port = 8788
local_protocol = "http"

# ── CRON : non supporté dans wrangler.toml de Cloudflare Pages ───────────────
# Les cron triggers nécessitent un Worker standalone séparé.
# Solutions alternatives pour déclencher les jobs automatiquement :
#
# Option A — cron-job.org (gratuit, recommandé) :
#   1. Créer un compte sur https://cron-job.org
#   2. Ajouter deux jobs :
#      • Toutes les heures  : GET https://nexusmarket.sn/cron/expire?token=nexus-wa-2026
#      • Chaque dimanche 3h : GET https://nexusmarket.sn/cron/cleanup?token=nexus-wa-2026
#      • Chaque jour 6h     : GET https://nexusmarket.sn/cron/db-usage?token=nexus-wa-2026  (alerte quota Supabase >70%)
#      • Toutes les 1-2 min : GET https://nexusmarket.sn/cron/dispatch?token=nexus-wa-2026 (avance le dispatch coursier sur timeout)
#
# Option B — GitHub Actions (si le repo est sur GitHub) :
#   Voir .github/workflows/cron.yml (à créer)
#
# Option C — Déclenchement manuel depuis Admin → Configuration → "Nettoyer maintenant"
