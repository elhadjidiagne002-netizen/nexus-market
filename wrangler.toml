# Configuration principale pour NEXUS Market
name = "nexus-market"
pages_build_output_dir = "."
compatibility_date = "2026-05-08"  # Mise à jour pour éviter les avertissements de compatibilité
compatibility_flags = ["nodejs_compat"]

# Variables d'environnement globales
[vars]
PAYTECH_ENV = "prod"
SITE_URL = "https://nexus-market.pages.dev"
FRONTEND_URL = "https://nexus-market.pages.dev"
VAPID_EMAIL = "mailto:admin@nexus-market.com"
NEXUS_COMMISSION = "0.15"
EUR_TO_XOF = "655.957"

# Configuration pour les Functions (API)
[functions]
# Chemin vers le dossier des fonctions
directory = "functions"

# Configuration pour éviter les erreurs de résolution de modules
# Indique à Wrangler que `_lib` est un module partagé
[[functions.rules]]
type = "ESModule"
globs = ["**/*.js"]

# Configuration pour les assets statiques (si nécessaire)
[site]
bucket = "./public"
entry-point = "functions"
