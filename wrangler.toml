# ─────────────────────────────────────────────────────────────────────────────
# wrangler.toml — NEXUS Market · Cloudflare Pages
# ─────────────────────────────────────────────────────────────────────────────
# Déploiement :  npx wrangler pages deploy .
# Dev local    :  npx wrangler pages dev . --port 8788
# ─────────────────────────────────────────────────────────────────────────────

name                   = "nexus-market"
pages_build_output_dir = "."

# nodejs_compat est requis pour :
#   - @supabase/supabase-js  (utilise process, Buffer…)
#   - web-push               (crypto Node.js)
#   - crypto (Buffer, timingSafeEqual…)
compatibility_flags    = ["nodejs_compat"]
compatibility_date     = "2024-09-23"

# ── Variables d'environnement (à définir aussi dans le Dashboard Pages) ───────
# Les secrets (SUPABASE_SERVICE_KEY, PAYTECH_*, VAPID_*) doivent être ajoutés
# via : npx wrangler pages secret put <NOM>
# ou directement dans Dashboard → Settings → Environment variables
#
# Exemples de variables NON-secrètes à mettre ici pour le dev local :
[vars]
PAYTECH_ENV  = "prod"
SITE_URL     = "https://nexus-market.pages.dev"
FRONTEND_URL = "https://nexus-market.pages.dev"
VAPID_EMAIL  = "mailto:admin@nexus-market.com"
NEXUS_COMMISSION = "0.15"
EUR_TO_XOF   = "655.957"
