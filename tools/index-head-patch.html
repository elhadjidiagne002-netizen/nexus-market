<!--
  ═══════════════════════════════════════════════════════════════════════════
  GasTon 360 — Corrections à appliquer dans votre index.html
  Remplacez la section <head> existante par celle-ci (ou appliquez patch par patch)
  ═══════════════════════════════════════════════════════════════════════════

  CORRECTIONS :
  1. meta apple-mobile-web-app-capable → mobile-web-app-capable (non déprécié)
  2. EmailJS SDK v4 (remplace l'ancien sdk non sécurisé)
  3. Enregistrement Service Worker via fichier physique /sw.js (plus de blob:)
  4. manifest.json lié correctement
-->

<!-- ══ DANS VOTRE <head>, REMPLACEZ / AJOUTEZ CES LIGNES ══ -->

<!-- ❌ SUPPRIMER cette ligne (dépréciée) :
<meta name="apple-mobile-web-app-capable" content="yes">
-->

<!-- ✅ REMPLACER PAR (standard moderne) : -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes"><!-- gardé pour vieux iOS uniquement -->
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GasTon 360">

<!-- ✅ Manifest PWA (lien correct) -->
<link rel="manifest" href="/manifest.json">

<!-- ✅ Theme color -->
<meta name="theme-color" content="#3ecf8e">

<!-- ══ EMAILJS SDK v4 — REMPLACEZ l'ancien script EmailJS ══ -->
<!-- ❌ SUPPRIMER l'ancien SDK (v2/v3) :
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script src="https://cdn.emailjs.com/dist/email.min.js"></script>
(toute version < 4)
-->

<!-- ✅ REMPLACER PAR EmailJS SDK v4 : -->
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script type="text/javascript">
  // Initialisation EmailJS v4 avec votre clé publique
  (function(){
    emailjs.init({
      publicKey: "WSBntSTWdh5d9usZC",   // Votre clé publique EmailJS
    });
  })();
</script>
