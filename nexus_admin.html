<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS Market — Espace Administrateur</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #0a2e1a 0%, #00853E 60%, #FDEF42 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .card {
    background: white;
    border-radius: 20px;
    padding: 2.5rem;
    max-width: 400px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .shield {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #00853E, #33A85A);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem;
    margin: 0 auto 1rem;
    box-shadow: 0 8px 20px rgba(0,133,62,0.3);
  }

  h1 {
    font-size: 1.3rem;
    font-weight: 800;
    color: #1F2937;
    margin-bottom: 0.25rem;
  }

  .subtitle { font-size: 0.85rem; color: #6B7280; }

  .form-group { margin-bottom: 1.2rem; }

  label {
    display: block;
    font-size: 0.82rem;
    font-weight: 700;
    color: #374151;
    margin-bottom: 0.4rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .input-wrap { position: relative; }

  input[type="email"],
  input[type="password"],
  input[type="text"] {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 2px solid #E5E7EB;
    border-radius: 10px;
    font-size: 0.95rem;
    font-family: inherit;
    transition: border-color 0.2s;
    outline: none;
    color: #1F2937;
    background: white;
  }

  input:focus { border-color: #00853E; }
  input.error { border-color: #E11B22; }

  .eye-btn {
    position: absolute;
    right: 0.75rem; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    cursor: pointer; color: #9CA3AF;
    font-size: 1rem; padding: 0.25rem;
    transition: color 0.2s;
  }
  .eye-btn:hover { color: #374151; }

  .btn {
    width: 100%;
    padding: 0.9rem;
    background: linear-gradient(135deg, #00853E, #33A85A);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 0.5rem;
    font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  }

  .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,133,62,0.35); }
  .btn:active { transform: none; }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .alert {
    background: #FEE2E2;
    color: #991B1B;
    border: 1px solid #FECACA;
    border-radius: 10px;
    padding: 0.75rem 1rem;
    font-size: 0.88rem;
    font-weight: 600;
    margin-bottom: 1rem;
    display: none;
    align-items: center;
    gap: 0.5rem;
  }
  .alert.show { display: flex; }
  .alert.success {
    background: #D1FAE5;
    color: #065F46;
    border-color: #A7F3D0;
  }
  .alert.info {
    background: #EFF6FF;
    color: #1E40AF;
    border-color: #BFDBFE;
  }

  .badge {
    display: inline-block;
    background: #FEF3C7;
    color: #D97706;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 0.2rem 0.6rem;
    border-radius: 50px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 1rem;
  }

  .hint {
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid #F3F4F6;
    font-size: 0.78rem;
    color: #9CA3AF;
    text-align: center;
  }
  .hint code {
    background: #F9FAFB;
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    color: #6B7280;
    font-size: 0.76rem;
  }
  .hint a {
    color: #00853E;
    text-decoration: none;
    font-weight: 600;
  }
  .hint a:hover { text-decoration: underline; }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Lockout state */
  .lockout-bar {
    height: 3px;
    background: #E5E7EB;
    border-radius: 2px;
    margin-bottom: 1rem;
    overflow: hidden;
    display: none;
  }
  .lockout-progress {
    height: 100%;
    background: linear-gradient(90deg, #E11B22, #FBBF24);
    border-radius: 2px;
    transition: width 1s linear;
  }

  .attempts-left {
    font-size: 0.75rem;
    color: #D97706;
    font-weight: 600;
    text-align: center;
    margin-bottom: 0.75rem;
    display: none;
  }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="shield">🔐</div>
    <span class="badge">Accès restreint</span>
    <h1>Espace Administrateur</h1>
    <p class="subtitle">NEXUS Market Sénégal</p>
  </div>

  <div class="alert" id="alert"></div>
  <div class="attempts-left" id="attemptsLeft"></div>
  <div class="lockout-bar" id="lockoutBar">
    <div class="lockout-progress" id="lockoutProgress"></div>
  </div>

  <div class="form-group">
    <label for="email">Email administrateur</label>
    <input type="email" id="email" placeholder="admin@nexus.sn"
      autocomplete="email" autofocus
      onkeydown="if(event.key==='Enter') document.getElementById('password').focus()" />
  </div>

  <div class="form-group">
    <label for="password">Mot de passe</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="••••••••"
        autocomplete="current-password"
        onkeydown="if(event.key==='Enter') login()" />
      <button type="button" class="eye-btn" id="eyeBtn" onclick="togglePw()" aria-label="Afficher/masquer">
        👁️
      </button>
    </div>
  </div>

  <button class="btn" id="btn" onclick="login()">
    🔑 Accéder au tableau de bord
  </button>

  <p class="hint">
    Fichier app : <code>index.html</code><br>
    Problème d'accès ? <a href="nexus_reset.html">Réinitialiser</a>
  </p>
</div>

<script>
// ─── Sécurité — verrouillage progressif ──────────────────────────────────────
const MAX_ATTEMPTS  = 5;          // Tentatives avant verrouillage
const LOCKOUT_MS    = 5 * 60 * 1000; // 5 minutes
const STORAGE_KEY   = 'nexus_admin_auth_state';

function getAuthState() {
  try {
    return JSON.parse(sessionStorage.getItem(STORAGE_KEY) || '{}');
  } catch { return {}; }
}

function setAuthState(state) {
  sessionStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function isLockedOut() {
  const state = getAuthState();
  if (!state.lockoutUntil) return false;
  if (Date.now() < state.lockoutUntil) return true;
  // Verrou expiré — reset
  setAuthState({ attempts: 0 });
  return false;
}

function recordFailedAttempt() {
  const state = getAuthState();
  const attempts = (state.attempts || 0) + 1;
  if (attempts >= MAX_ATTEMPTS) {
    setAuthState({ attempts, lockoutUntil: Date.now() + LOCKOUT_MS });
    startLockoutTimer(LOCKOUT_MS);
  } else {
    setAuthState({ attempts });
    showAttemptsWarning(MAX_ATTEMPTS - attempts);
  }
  return attempts;
}

function resetAttempts() {
  setAuthState({ attempts: 0 });
}

function showAttemptsWarning(remaining) {
  if (remaining <= 2) {
    const el = document.getElementById('attemptsLeft');
    el.style.display = 'block';
    el.textContent = `⚠️ ${remaining} tentative${remaining > 1 ? 's' : ''} restante${remaining > 1 ? 's' : ''} avant verrouillage temporaire`;
  }
}

let lockoutTimer = null;
function startLockoutTimer(remainingMs) {
  const bar   = document.getElementById('lockoutBar');
  const prog  = document.getElementById('lockoutProgress');
  const btn   = document.getElementById('btn');
  const total = remainingMs;

  bar.style.display = 'block';
  prog.style.width  = '100%';

  function updateTimer() {
    const state = getAuthState();
    const left  = state.lockoutUntil - Date.now();
    if (left <= 0) {
      bar.style.display = 'none';
      btn.disabled = false;
      btn.innerHTML = '🔑 Accéder au tableau de bord';
      document.getElementById('attemptsLeft').style.display = 'none';
      showAlert('Vous pouvez réessayer.', 'info');
      return;
    }
    prog.style.width = (left / total * 100) + '%';
    const mins = Math.floor(left / 60000);
    const secs = Math.floor((left % 60000) / 1000);
    btn.innerHTML = `⏳ Verrouillé — ${mins}:${secs.toString().padStart(2, '0')}`;
    btn.disabled = true;
    lockoutTimer = setTimeout(updateTimer, 1000);
  }
  updateTimer();
}

// ─── Affichage alertes ────────────────────────────────────────────────────────
function showAlert(msg, type = '') {
  const el = document.getElementById('alert');
  el.textContent = msg;
  el.className = 'alert show' + (type ? ' ' + type : '');
}

function hideAlert() {
  document.getElementById('alert').className = 'alert';
}

// ─── Toggle mot de passe ──────────────────────────────────────────────────────
let showPw = false;
function togglePw() {
  showPw = !showPw;
  const inp = document.getElementById('password');
  const btn = document.getElementById('eyeBtn');
  inp.type = showPw ? 'text' : 'password';
  btn.textContent = showPw ? '🙈' : '👁️';
  btn.setAttribute('aria-label', showPw ? 'Masquer' : 'Afficher');
}

// ─── Connexion ────────────────────────────────────────────────────────────────
function login() {
  if (isLockedOut()) {
    const state = getAuthState();
    const left  = state.lockoutUntil - Date.now();
    startLockoutTimer(left);
    showAlert('Trop de tentatives échouées. Veuillez patienter.', '');
    return;
  }

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('btn');

  if (!email || !password) {
    showAlert('⚠️ Veuillez remplir tous les champs', '');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Vérification...';
  hideAlert();

  // Délai anti-timing-attack (randomisé)
  const delay = 400 + Math.random() * 300;

  setTimeout(() => {
    let users = {};
    try { users = JSON.parse(localStorage.getItem('users') || '{}'); } catch(e) {}

    // Recherche d'un compte admin correspondant
    const user = Object.values(users).find(u =>
      u.email === email &&
      u.role  === 'admin' &&
      verifyPassword(password, u.password)
    );

    if (user) {
      resetAttempts();
      showAlert('✅ Connexion réussie ! Redirection en cours...', 'success');

      // Stocker le token de session admin (limité à la session navigateur)
      const token = {
        userId  : user.id,
        ts      : Date.now(),
        expires : Date.now() + 8 * 60 * 60 * 1000, // 8h
      };
      sessionStorage.setItem('nexus_admin_autologin', JSON.stringify(token));

      // Cross-tab via localStorage (nettoyé après usage par l'app)
      localStorage.setItem('nexus_pending_admin', JSON.stringify(token));

      // Déterminer le fichier app cible
      const appFile = detectAppFile();

      setTimeout(() => {
        window.location.href = appFile;
      }, 700);

    } else {
      const attempts = recordFailedAttempt();
      document.getElementById('password').value = '';
      document.getElementById('password').focus();

      if (attempts >= MAX_ATTEMPTS) {
        showAlert('🔒 Compte temporairement verrouillé après trop d\'échecs. Réessayez dans 5 minutes.', '');
        return;
      }

      showAlert('❌ Email ou mot de passe administrateur incorrect', '');
      btn.disabled = false;
      btn.innerHTML = '🔑 Accéder au tableau de bord';
    }
  }, delay);
}

// ─── Détection automatique du fichier app ────────────────────────────────────
function detectAppFile() {
  // Candidats dans l'ordre de priorité
  const candidates = [
    'index.html',
    'nexus_market.html',
    'nexus_market_FIXED.html',
    'nexus_market_FINAL_v3.html',
    'nexus_market_READY.html',
    'nexus_market_PRODUCTION.html',
  ];

  // Vérifier si on peut déduire depuis le referrer
  const ref = document.referrer;
  if (ref) {
    const match = ref.match(/([^/\\]+\.html)$/);
    if (match && !['nexus_admin.html', 'nexus_reset.html'].includes(match[1])) {
      return match[1];
    }
  }

  // Utiliser le premier candidat par défaut
  return candidates[0];
}

// ─── Vérification mot de passe ────────────────────────────────────────────────
// Note : En mode demo (localStorage), les mots de passe sont hashés avec hashSimple().
// En production avec le backend Node.js, l'authentification utilise bcrypt via l'API.
function hashSimple(pw) {
  let hash = 0;
  for (let i = 0; i < pw.length; i++) {
    const char = pw.charCodeAt(i);
    hash = ((hash << 5) - hash) + char;
    hash = hash & hash;
  }
  return 'dev_' + Math.abs(hash).toString(36);
}

function verifyPassword(pw, storedHash) {
  if (!pw || !storedHash) return false;

  // bcrypt (prod) — non vérifiable sans lib, on signale qu'il faut le backend
  if (storedHash.startsWith('$2b$') || storedHash.startsWith('$2a$')) {
    showAlert('ℹ️ Ce compte utilise bcrypt (production). Connectez-vous via l\'API backend.', 'info');
    return false;
  }

  // Hash demo (dev_xxxx ou hashed_xxxx)
  if (storedHash.startsWith('dev_') || storedHash.startsWith('hashed_')) {
    return hashSimple(pw) === storedHash;
  }

  // Mot de passe en clair (comptes démo sans hash appliqué)
  return pw === storedHash;
}

// ─── Vérifier si un verrou est déjà actif au chargement ──────────────────────
(function() {
  if (isLockedOut()) {
    const state = getAuthState();
    const left  = state.lockoutUntil - Date.now();
    showAlert('Trop de tentatives échouées. Veuillez patienter avant de réessayer.', '');
    startLockoutTimer(left);
  }
})();
</script>
</body>
</html>
