name = "nexus-market-api"
compatibility_date = "2024-01-01"
pages_build_output_dir = "."

[vars]
SITE_URL = "https://nexus-market-asb.pages.dev"
PAYTECH_ENV = "test"
EMAIL_FROM = "NEXUS Market <noreply@nexus.sn>"

# Secrets à définir via : wrangler pages secret put NOM_VARIABLE
# SUPABASE_URL
# SUPABASE_ANON_KEY
# SUPABASE_SERVICE_ROLE_KEY
# PAYTECH_API_KEY
# PAYTECH_SECRET_KEY
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# RESEND_API_KEY
# APIX_API_KEY

[[d1_databases]]
binding = "DB"
database_name = "nexus-market-db"
database_id = "VOTRE_D1_DATABASE_ID"
