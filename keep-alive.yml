name: Supabase & Render Keep Alive

on:
  schedule:
    - cron: '0 0 */3 * *' # S'exécute tous les 3 jours à minuit
  workflow_dispatch: # Permet de le lancer manuellement

env:
  SUPABASE_URL: https://pqcqbstbdujzaclsiosv.supabase.co
  FRONTEND_URL: https://nexus-market-md360.vercel.app

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # ── 1. Ping Supabase ──────────────────────────────────────────
      - name: Ping Supabase API
        run: |
          echo "🔔 Ping Supabase..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ env.SUPABASE_URL }}/rest/v1/profiles?select=count" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase HTTP status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "❌ Supabase ne répond pas correctement (status $STATUS)"
            exit 1
          fi
          echo "✅ Supabase réveillé (status $STATUS)"

      # ── 2. Ping Render Backend ────────────────────────────────────
      # ⚠️  Remplace BACKEND_URL dans GitHub Secrets par l'URL de ton serveur Render
      #     ex: https://nexus-backend-xxxx.onrender.com
      - name: Ping Render Backend
        run: |
          echo "🔔 Ping Render backend..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 60 \
            -X GET "${{ secrets.BACKEND_URL }}/api/health")
          echo "Render HTTP status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "⚠️  Render ne répond pas (status $STATUS) — cold start possible, non bloquant"
          else
            echo "✅ Render réveillé (status $STATUS)"
          fi

      # ── 3. Ping Vercel Frontend ───────────────────────────────────
      - name: Ping Vercel Frontend
        run: |
          echo "🔔 Ping Vercel..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            -X GET "${{ env.FRONTEND_URL }}")
          echo "Vercel HTTP status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "⚠️  Vercel ne répond pas (status $STATUS)"
          else
            echo "✅ Vercel opérationnel (status $STATUS)"
          fi

      # ── 4. Résumé ─────────────────────────────────────────────────
      - name: Résumé
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Keep-alive terminé ✓"
          echo "  $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  Supabase : pqcqbstbdujzaclsiosv"
          echo "  Frontend : nexus-market-md360.vercel.app"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
