# ─── netlify.toml — NEXUS Market ────────────────────────────────────────────

[build]
  publish   = "."
  command   = ""
  functions = "netlify/functions"

[build.environment]
  NODE_ENV    = "production"
  PAYTECH_ENV = "prod"

[functions]
  node_bundler = "esbuild"

# ── Redirects ─────────────────────────────────────────────────────────────────

# Paiements
[[redirects]]
  from   = "/api/payments/mobile-money"
  to     = "/.netlify/functions/payments-mobile-money"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/payments/webhook"
  to     = "/.netlify/functions/paytech-webhook"
  status = 200
  force  = true

# Push notifications
[[redirects]]
  from   = "/api/push/vapid-key"
  to     = "/.netlify/functions/push-vapid-key"
  status = 200

[[redirects]]
  from   = "/api/push/subscribe"
  to     = "/.netlify/functions/push-subscribe"
  status = 200

[[redirects]]
  from   = "/api/push/send"
  to     = "/.netlify/functions/push-send"
  status = 200

# SPA fallback — doit rester en dernier
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Headers ────────────────────────────────────────────────────────────────────

# index.html — jamais mis en cache (SPA, doit être toujours frais)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control          = "no-cache, no-store, must-revalidate"
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# Racine — même règle que index.html
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Fonctions Netlify — pas de cache
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control                = "no-store"
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

# Assets statiques — cache 1 an (immuables car hash dans le nom)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fonts — cache long
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Service Worker — jamais mis en cache
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store"
