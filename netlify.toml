# ─── netlify.toml — NEXUS Market ────────────────────────────────────────────
# Déploiement Netlify — application single-file (index.html)
# PayTech Mobile Money via Netlify Functions (clés côté serveur)
# ─────────────────────────────────────────────────────────────────────────────

[build]
  publish   = "."
  command   = ""
  functions = "netlify/functions"

# ── Variables d'environnement (fallback — préférer le Dashboard Netlify) ──
# NE PAS mettre les clés secrètes ici si le dépôt est public.
[build.environment]
  NODE_ENV    = "production"
  PAYTECH_ENV = "prod"

# ── Redirects ─────────────────────────────────────────────────────────────────

# PayTech — initiation de paiement Mobile Money
[[redirects]]
  from   = "/api/payments/mobile-money"
  to     = "/.netlify/functions/payments-mobile-money"
  status = 200
  force  = true

# PayTech — IPN Webhook (notification serveur)
[[redirects]]
  from   = "/api/payments/webhook"
  to     = "/.netlify/functions/paytech-webhook"
  status = 200
  force  = true

# SPA fallback — toutes les routes inconnues → index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── En-têtes de sécurité ──────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
